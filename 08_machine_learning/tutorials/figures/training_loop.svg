<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arb" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Step 1: Forward Pass -->
  <rect x="20" y="40" width="150" height="80" rx="8" fill="#e0e7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="95" y="68" text-anchor="middle" font-weight="bold" fill="#1e40af" font-size="13">1. FORWARD PASS</text>
  <text x="95" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">Feed input</text>
  <text x="95" y="103" text-anchor="middle" font-size="11" fill="#3b82f6">through layers</text>

  <line x1="170" y1="80" x2="200" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Step 2: Compute Loss -->
  <rect x="205" y="40" width="150" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="280" y="68" text-anchor="middle" font-weight="bold" fill="#92400e" font-size="13">2. COMPUTE LOSS</text>
  <text x="280" y="88" text-anchor="middle" font-size="11" fill="#b45309">Compare output</text>
  <text x="280" y="103" text-anchor="middle" font-size="11" fill="#b45309">to true label</text>

  <line x1="355" y1="80" x2="385" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Step 3: Backward Pass -->
  <rect x="390" y="40" width="165" height="80" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="472" y="68" text-anchor="middle" font-weight="bold" fill="#9d174d" font-size="13">3. BACKWARD PASS</text>
  <text x="472" y="88" text-anchor="middle" font-size="11" fill="#db2777">Compute gradients</text>
  <text x="472" y="103" text-anchor="middle" font-size="11" fill="#db2777">(backpropagation)</text>

  <line x1="555" y1="80" x2="580" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Step 4: Update Weights -->
  <rect x="585" y="40" width="120" height="80" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="645" y="63" text-anchor="middle" font-weight="bold" fill="#065f46" font-size="13">4. UPDATE</text>
  <text x="645" y="80" text-anchor="middle" font-weight="bold" fill="#065f46" font-size="13">WEIGHTS</text>
  <text x="645" y="103" text-anchor="middle" font-size="12" fill="#059669">w = w - lr&#xB7;&#x2207;</text>

  <!-- Loop-back arrow -->
  <path d="M 645,120 L 645,200 L 95,200 L 95,120" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arb)"/>
  <text x="370" y="220" text-anchor="middle" font-size="12" fill="#2563eb" font-style="italic">repeat for each batch / epoch</text>
</svg>