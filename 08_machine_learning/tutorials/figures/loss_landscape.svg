<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <defs>
    <marker id="ax" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <text x="240" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Loss Landscape (Conceptual)</text>

  <!-- Axes -->
  <line x1="60" y1="270" x2="440" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#ax)"/>
  <line x1="60" y1="270" x2="60" y2="40" stroke="#555" stroke-width="1.5" marker-end="url(#ax)"/>
  <text x="250" y="295" text-anchor="middle" fill="#555">Weight values</text>
  <text x="30" y="155" text-anchor="middle" fill="#555" transform="rotate(-90,30,155)">Loss</text>

  <!-- Loss curve -->
  <path d="M 70,70 C 90,75 100,85 120,130 C 135,165 145,190 160,195 C 175,200 180,190 195,160 C 210,130 215,125 230,145 C 245,165 248,170 260,170 C 275,168 290,140 310,180 C 330,220 340,240 360,250 C 375,255 390,250 410,245" fill="none" stroke="#2563eb" stroke-width="2.5"/>

  <!-- Local minimum label -->
  <circle cx="160" cy="197" r="4" fill="#d97706"/>
  <line x1="160" y1="197" x2="180" y2="220" stroke="#d97706" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="185" y="235" font-size="12" fill="#d97706">Local minimum</text>

  <!-- Global minimum label -->
  <circle cx="408" cy="246" r="4" fill="#059669"/>
  <line x1="408" y1="246" x2="388" y2="230" stroke="#059669" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="350" y="225" font-size="12" fill="#059669">Global minimum</text>
  <text x="365" y="240" font-size="11" fill="#059669">(goal)</text>

  <!-- Annotation -->
  <text x="240" y="310" text-anchor="middle" font-size="12" fill="#888" font-style="italic">The optimizer navigates this landscape to find the lowest point.</text>
</svg>