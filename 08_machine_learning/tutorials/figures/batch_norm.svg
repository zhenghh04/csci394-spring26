<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <text x="280" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Batch Normalization</text>

  <!-- Without BatchNorm -->
  <text x="140" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">Without BatchNorm</text>

  <!-- Axes -->
  <line x1="40" y1="180" x2="260" y2="180" stroke="#999" stroke-width="1"/>
  <line x1="40" y1="180" x2="40" y2="65" stroke="#999" stroke-width="1"/>
  <text x="150" y="200" text-anchor="middle" font-size="11" fill="#666">Training steps</text>
  <text x="25" y="125" font-size="10" fill="#666" transform="rotate(-90,25,125)">Activations</text>

  <!-- Unstable curve -->
  <path d="M 50,160 C 70,80 90,170 110,90 C 130,140 150,70 170,150 C 190,100 210,160 240,85" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text x="140" y="215" text-anchor="middle" font-size="11" fill="#dc2626" font-style="italic">unstable, drifting</text>

  <!-- With BatchNorm -->
  <text x="420" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">With BatchNorm</text>

  <!-- Axes -->
  <line x1="310" y1="180" x2="530" y2="180" stroke="#999" stroke-width="1"/>
  <line x1="310" y1="180" x2="310" y2="65" stroke="#999" stroke-width="1"/>
  <text x="420" y="200" text-anchor="middle" font-size="11" fill="#666">Training steps</text>

  <!-- Stable centered band -->
  <rect x="320" y="115" width="200" height="40" rx="4" fill="#d1fae5" opacity="0.4"/>
  <line x1="310" y1="135" x2="530" y2="135" stroke="#059669" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Stable curve -->
  <path d="M 320,140 C 340,125 360,145 380,130 C 400,138 420,128 440,135 C 460,132 480,138 510,133" fill="none" stroke="#059669" stroke-width="2"/>
  <text x="420" y="215" text-anchor="middle" font-size="11" fill="#059669" font-style="italic">centered and scaled</text>

  <!-- Zero mean label -->
  <text x="540" y="138" font-size="10" fill="#888">&#x3BC;=0</text>
</svg>