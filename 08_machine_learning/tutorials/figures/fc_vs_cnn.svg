<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 420" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <defs>
    <marker id="av" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <text x="370" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">FC vs CNN: Side-by-Side Comparison</text>

  <!-- FC Side -->
  <rect x="20" y="40" width="320" height="340" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1" opacity="0.3"/>
  <text x="180" y="65" text-anchor="middle" font-size="15" font-weight="bold" fill="#dc2626">Fully Connected Network</text>

  <rect x="120" y="80" width="120" height="34" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="180" y="102" text-anchor="middle" fill="#991b1b" font-size="12">Input</text>
  <line x1="180" y1="114" x2="180" y2="130" stroke="#555" stroke-width="1" marker-end="url(#av)"/>

  <rect x="100" y="135" width="160" height="28" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="180" y="154" text-anchor="middle" font-size="11" fill="#991b1b">[flatten to 1D vector]</text>
  <line x1="180" y1="163" x2="180" y2="178" stroke="#555" stroke-width="1" marker-end="url(#av)"/>

  <rect x="100" y="183" width="160" height="36" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="180" y="198" text-anchor="middle" fill="#991b1b" font-size="11">FC Layer: 3072x512</text>
  <text x="180" y="212" text-anchor="middle" fill="#991b1b" font-size="10">= 1.5M weights</text>
  <line x1="180" y1="219" x2="180" y2="234" stroke="#555" stroke-width="1" marker-end="url(#av)"/>

  <rect x="120" y="239" width="120" height="28" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="180" y="258" text-anchor="middle" fill="#991b1b" font-size="11">FC Layer</text>
  <line x1="180" y1="267" x2="180" y2="282" stroke="#555" stroke-width="1" marker-end="url(#av)"/>

  <rect x="120" y="287" width="120" height="28" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="180" y="306" text-anchor="middle" fill="#991b1b" font-size="11">FC Layer</text>
  <line x1="180" y1="315" x2="180" y2="330" stroke="#555" stroke-width="1" marker-end="url(#av)"/>

  <rect x="120" y="335" width="120" height="28" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="180" y="354" text-anchor="middle" fill="#991b1b" font-size="12">Output</text>

  <!-- Divider -->
  <line x1="370" y1="40" x2="370" y2="380" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- CNN Side -->
  <rect x="400" y="40" width="320" height="340" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1" opacity="0.3"/>
  <text x="560" y="65" text-anchor="middle" font-size="15" font-weight="bold" fill="#059669">Convolutional Neural Network</text>

  <rect x="500" y="80" width="120" height="34" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="560" y="102" text-anchor="middle" fill="#065f46" font-size="12">Input</text>
  <line x1="560" y1="114" x2="560" y2="130" stroke="#555" stroke-width="1" marker-end="url(#av)"/>

  <rect x="480" y="135" width="160" height="28" rx="4" fill="#a7f3d0" stroke="#059669" stroke-width="1"/>
  <text x="560" y="154" text-anchor="middle" font-size="11" fill="#065f46">[keep 2D structure]</text>
  <line x1="560" y1="163" x2="560" y2="178" stroke="#555" stroke-width="1" marker-end="url(#av)"/>

  <rect x="475" y="183" width="170" height="36" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="560" y="198" text-anchor="middle" fill="#065f46" font-size="11">Conv 3x3 (3&#x2192;32)</text>
  <text x="560" y="212" text-anchor="middle" fill="#065f46" font-size="10">= 864 weights (shared)</text>
  <line x1="560" y1="219" x2="560" y2="234" stroke="#555" stroke-width="1" marker-end="url(#av)"/>

  <rect x="500" y="239" width="120" height="28" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="560" y="258" text-anchor="middle" fill="#065f46" font-size="11">MaxPool</text>
  <line x1="560" y1="267" x2="560" y2="282" stroke="#555" stroke-width="1" marker-end="url(#av)"/>

  <rect x="490" y="287" width="140" height="28" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="560" y="306" text-anchor="middle" fill="#065f46" font-size="11">Conv 3x3 (deeper)</text>
  <line x1="560" y1="315" x2="560" y2="330" stroke="#555" stroke-width="1" marker-end="url(#av)"/>

  <rect x="500" y="335" width="120" height="28" rx="6" fill="#a7f3d0" stroke="#059669" stroke-width="1.5"/>
  <text x="560" y="354" text-anchor="middle" fill="#065f46" font-size="12">Output</text>

  <!-- Stats row -->
  <text x="180" y="398" text-anchor="middle" font-size="12" fill="#dc2626">Params: ~1,739,000 | Acc: ~55%</text>
  <text x="560" y="398" text-anchor="middle" font-size="12" fill="#059669">Params: ~815,000 | Acc: ~87%</text>
</svg>