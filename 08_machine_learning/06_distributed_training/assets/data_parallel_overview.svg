<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #334155; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 15px Arial, sans-serif; fill: #475569; }
      .rankBox0 { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; rx: 14; }
      .rankBox1 { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; rx: 14; }
      .rankBox2 { fill: #fee2e2; stroke: #dc2626; stroke-width: 3; rx: 14; }
      .model { fill: #f8fafc; stroke: #475569; stroke-width: 2; rx: 10; }
      .dataA { fill: #bfdbfe; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .dataB { fill: #bbf7d0; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .dataC { fill: #fecaca; stroke: #dc2626; stroke-width: 2; rx: 10; }
      .arrow0 { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arr0); }
      .arrow1 { stroke: #16a34a; stroke-width: 4; fill: none; marker-end: url(#arr1); }
      .arrow2 { stroke: #dc2626; stroke-width: 4; fill: none; marker-end: url(#arr2); }
      .sync { stroke: #7c3aed; stroke-width: 4; stroke-dasharray: 10 8; fill: none; marker-end: url(#arrSync); }
      .legend { font: 600 16px Arial, sans-serif; fill: #1e293b; }
    </style>
    <marker id="arr0" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#2563eb"/>
    </marker>
    <marker id="arr1" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#16a34a"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#dc2626"/>
    </marker>
    <marker id="arrSync" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#7c3aed"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">Data Parallel Training: Same Model, Different Data</text>
  <text x="40" y="78" class="subtitle">Example: CIFAR-10 batches split across 3 ranks</text>

  <rect x="70" y="140" width="290" height="320" class="rankBox0"/>
  <text x="95" y="182" class="label">Rank 0</text>
  <rect x="105" y="215" width="220" height="75" class="dataA"/>
  <text x="158" y="258" class="label">Batch A</text>
  <rect x="105" y="335" width="220" height="85" class="model"/>
  <text x="142" y="375" class="label">CNN Replica</text>
  <text x="128" y="400" class="small">same weights as all other ranks</text>
  <path d="M215 290 L215 335" class="arrow0"/>

  <rect x="455" y="140" width="290" height="320" class="rankBox1"/>
  <text x="480" y="182" class="label">Rank 1</text>
  <rect x="490" y="215" width="220" height="75" class="dataB"/>
  <text x="543" y="258" class="label">Batch B</text>
  <rect x="490" y="335" width="220" height="85" class="model"/>
  <text x="527" y="375" class="label">CNN Replica</text>
  <text x="513" y="400" class="small">same weights as all other ranks</text>
  <path d="M600 290 L600 335" class="arrow1"/>

  <rect x="840" y="140" width="290" height="320" class="rankBox2"/>
  <text x="865" y="182" class="label">Rank 2</text>
  <rect x="875" y="215" width="220" height="75" class="dataC"/>
  <text x="928" y="258" class="label">Batch C</text>
  <rect x="875" y="335" width="220" height="85" class="model"/>
  <text x="912" y="375" class="label">CNN Replica</text>
  <text x="898" y="400" class="small">same weights as all other ranks</text>
  <path d="M985 290 L985 335" class="arrow2"/>

  <path d="M325 380 C390 320, 420 320, 490 380" class="sync"/>
  <path d="M710 380 C775 320, 805 320, 875 380" class="sync"/>
  <path d="M875 395 C760 465, 440 465, 325 395" class="sync"/>

  <text x="420" y="520" class="legend">Dashed purple links: gradient synchronization after backward pass</text>
  <text x="120" y="565" class="small">Each rank does local compute on its own mini-batch, then communicates so all replicas keep the same updated parameters.</text>

  <rect x="70" y="600" width="1060" height="70" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" rx="12"/>
  <text x="95" y="636" class="legend">Key point:</text>
  <text x="190" y="636" class="small">The model is replicated. The data is partitioned. Communication happens to combine learning signals, not to split the layer computation itself.</text>
</svg>
