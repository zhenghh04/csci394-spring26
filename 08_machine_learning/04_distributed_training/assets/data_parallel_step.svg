<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #334155; }
      .rank { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .stepText { font: 600 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 14px Arial, sans-serif; fill: #475569; }
      .box0 { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .box1 { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .box2 { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 12; }
      .syncBand { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 3; rx: 14; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#475569"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">One Data-Parallel Training Step</text>
  <text x="40" y="78" class="subtitle">All ranks run the same program, then synchronize gradients before the optimizer step</text>

  <text x="70" y="140" class="rank">Rank 0</text>
  <text x="70" y="300" class="rank">Rank 1</text>
  <text x="70" y="460" class="rank">Rank 2</text>

  <rect x="180" y="95" width="145" height="70" class="box0"/>
  <text x="218" y="125" class="stepText">Load Batch A</text>
  <text x="205" y="148" class="small">different images</text>

  <rect x="365" y="95" width="145" height="70" class="box0"/>
  <text x="395" y="125" class="stepText">Forward</text>
  <text x="392" y="148" class="small">same model</text>

  <rect x="550" y="95" width="165" height="70" class="box0"/>
  <text x="584" y="125" class="stepText">Backward</text>
  <text x="575" y="148" class="small">local gradients</text>

  <rect x="875" y="95" width="165" height="70" class="box0"/>
  <text x="907" y="125" class="stepText">Optimizer</text>
  <text x="919" y="148" class="small">same update</text>

  <rect x="180" y="255" width="145" height="70" class="box1"/>
  <text x="218" y="285" class="stepText">Load Batch B</text>
  <text x="205" y="308" class="small">different images</text>

  <rect x="365" y="255" width="145" height="70" class="box1"/>
  <text x="395" y="285" class="stepText">Forward</text>
  <text x="392" y="308" class="small">same model</text>

  <rect x="550" y="255" width="165" height="70" class="box1"/>
  <text x="584" y="285" class="stepText">Backward</text>
  <text x="575" y="308" class="small">local gradients</text>

  <rect x="875" y="255" width="165" height="70" class="box1"/>
  <text x="907" y="285" class="stepText">Optimizer</text>
  <text x="919" y="308" class="small">same update</text>

  <rect x="180" y="415" width="145" height="70" class="box2"/>
  <text x="218" y="445" class="stepText">Load Batch C</text>
  <text x="205" y="468" class="small">different images</text>

  <rect x="365" y="415" width="145" height="70" class="box2"/>
  <text x="395" y="445" class="stepText">Forward</text>
  <text x="392" y="468" class="small">same model</text>

  <rect x="550" y="415" width="165" height="70" class="box2"/>
  <text x="584" y="445" class="stepText">Backward</text>
  <text x="575" y="468" class="small">local gradients</text>

  <rect x="875" y="415" width="165" height="70" class="box2"/>
  <text x="907" y="445" class="stepText">Optimizer</text>
  <text x="919" y="468" class="small">same update</text>

  <path d="M325 130 L365 130" class="arrow"/>
  <path d="M510 130 L550 130" class="arrow"/>
  <path d="M715 130 L875 130" class="arrow"/>

  <path d="M325 290 L365 290" class="arrow"/>
  <path d="M510 290 L550 290" class="arrow"/>
  <path d="M715 290 L875 290" class="arrow"/>

  <path d="M325 450 L365 450" class="arrow"/>
  <path d="M510 450 L550 450" class="arrow"/>
  <path d="M715 450 L875 450" class="arrow"/>

  <rect x="735" y="170" width="105" height="345" class="syncBand"/>
  <text x="753" y="240" class="stepText">All-Reduce</text>
  <text x="756" y="266" class="stepText">Gradients</text>
  <text x="748" y="305" class="small">combine local</text>
  <text x="754" y="326" class="small">gradients from</text>
  <text x="768" y="347" class="small">all ranks</text>
  <text x="754" y="388" class="small">after this, the</text>
  <text x="748" y="409" class="small">optimizer step is</text>
  <text x="757" y="430" class="small">consistent on all</text>
  <text x="780" y="451" class="small">replicas</text>

  <rect x="70" y="575" width="1070" height="120" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" rx="12"/>
  <text x="95" y="615" class="stepText">Interpretation</text>
  <text x="95" y="645" class="small">Compute is local during forward and backward passes. Communication happens when gradients are synchronized.</text>
  <text x="95" y="670" class="small">This is why data parallel training often scales well at first, then flattens when synchronization cost becomes more important.</text>
</svg>
