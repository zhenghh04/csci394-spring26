<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <defs>
    <marker id="af" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <text x="360" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">What Each CNN Layer Learns</text>

  <!-- Block 1: Low-level -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="180" height="130" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="90" y="22" text-anchor="middle" font-weight="bold" fill="#1e40af" font-size="13">Block 1 (Early)</text>
    <text x="90" y="40" text-anchor="middle" font-size="12" fill="#555">Low-level features</text>

    <!-- Edge icons -->
    <rect x="15" y="52" width="50" height="50" rx="4" fill="white" stroke="#999"/>
    <line x1="25" y1="60" x2="55" y2="92" stroke="#2563eb" stroke-width="2"/>
    <line x1="30" y1="60" x2="60" y2="92" stroke="#2563eb" stroke-width="2"/>
    <line x1="35" y1="60" x2="65" y2="92" stroke="#2563eb" stroke-width="1.5" opacity="0.5"/>

    <rect x="75" y="52" width="50" height="50" rx="4" fill="white" stroke="#999"/>
    <line x1="85" y1="77" x2="115" y2="77" stroke="#2563eb" stroke-width="2"/>
    <line x1="85" y1="72" x2="115" y2="72" stroke="#2563eb" stroke-width="2"/>
    <line x1="85" y1="82" x2="115" y2="82" stroke="#2563eb" stroke-width="1.5" opacity="0.5"/>

    <text x="40" y="118" text-anchor="middle" font-size="11" fill="#666">edges</text>
    <text x="100" y="118" text-anchor="middle" font-size="11" fill="#666">lines</text>
  </g>

  <!-- Arrow -->
  <line x1="235" y1="110" x2="275" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#af)"/>

  <!-- Block 2: Mid-level -->
  <g transform="translate(280,40)">
    <rect x="0" y="0" width="180" height="130" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="90" y="22" text-anchor="middle" font-weight="bold" fill="#1e40af" font-size="13">Block 2 (Middle)</text>
    <text x="90" y="40" text-anchor="middle" font-size="12" fill="#555">Mid-level features</text>

    <!-- Curve/texture icons -->
    <rect x="15" y="52" width="50" height="50" rx="4" fill="white" stroke="#999"/>
    <path d="M 25,92 C 30,62 55,62 60,92" fill="none" stroke="#2563eb" stroke-width="2"/>

    <rect x="75" y="52" width="50" height="50" rx="4" fill="white" stroke="#999"/>
    <path d="M 85,77 C 95,65 105,85 115,73" fill="none" stroke="#2563eb" stroke-width="2"/>
    <path d="M 85,85 C 95,73 105,93 115,81" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.6"/>

    <text x="40" y="118" text-anchor="middle" font-size="11" fill="#666">curves</text>
    <text x="100" y="118" text-anchor="middle" font-size="11" fill="#666">textures</text>
  </g>

  <!-- Arrow -->
  <line x1="475" y1="110" x2="515" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#af)"/>

  <!-- Block 3: High-level -->
  <g transform="translate(520,40)">
    <rect x="0" y="0" width="170" height="130" rx="8" fill="#93c5fd" stroke="#2563eb" stroke-width="1.5"/>
    <text x="85" y="22" text-anchor="middle" font-weight="bold" fill="#1e40af" font-size="13">Block 3 (Deep)</text>
    <text x="85" y="40" text-anchor="middle" font-size="12" fill="#555">High-level features</text>

    <!-- Object icon -->
    <rect x="35" y="52" width="60" height="55" rx="4" fill="white" stroke="#999"/>
    <circle cx="65" cy="68" r="6" fill="none" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="55" cy="68" r="6" fill="none" stroke="#2563eb" stroke-width="1.5"/>
    <path d="M 48,82 C 52,92 68,92 72,82" fill="none" stroke="#2563eb" stroke-width="1.5"/>

    <text x="65" y="122" text-anchor="middle" font-size="11" fill="#666">object parts</text>
  </g>
</svg>