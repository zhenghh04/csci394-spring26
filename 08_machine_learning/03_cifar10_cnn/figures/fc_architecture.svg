<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Fully Connected Network for MNIST</text>

  <!-- Input image -->
  <rect x="15" y="100" width="70" height="70" rx="4" fill="#f0f0f0" stroke="#999" stroke-width="1.5"/>
  <text x="50" y="142" text-anchor="middle" font-size="28" fill="#333">7</text>
  <text x="50" y="85" text-anchor="middle" font-size="11" fill="#888">Input Image</text>
  <text x="50" y="188" text-anchor="middle" font-size="10" fill="#888">28 x 28</text>

  <!-- Arrow -->
  <line x1="90" y1="135" x2="120" y2="135" stroke="#555" stroke-width="1.5"/>
  <polygon points="118,131 126,135 118,139" fill="#555"/>

  <!-- Flatten layer -->
  <rect x="130" y="55" width="30" height="160" rx="4" fill="#e0e7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="145" y="140" text-anchor="middle" font-size="10" fill="#1e40af" transform="rotate(-90,145,140)">Flatten</text>
  <text x="145" y="40" text-anchor="middle" font-size="11" fill="#888">784</text>

  <!-- Connection lines (simplified) -->
  <g stroke="#ccc" stroke-width="0.5" opacity="0.5">
    <line x1="160" y1="80" x2="240" y2="75"/>
    <line x1="160" y1="100" x2="240" y2="95"/>
    <line x1="160" y1="120" x2="240" y2="115"/>
    <line x1="160" y1="140" x2="240" y2="135"/>
    <line x1="160" y1="160" x2="240" y2="155"/>
    <line x1="160" y1="180" x2="240" y2="175"/>
    <line x1="160" y1="80" x2="240" y2="135"/>
    <line x1="160" y1="180" x2="240" y2="115"/>
  </g>

  <!-- Hidden Layer 1 -->
  <rect x="240" y="60" width="30" height="150" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="255" y="140" text-anchor="middle" font-size="10" fill="#1e40af" transform="rotate(-90,255,140)">Hidden 1 + ReLU</text>
  <text x="255" y="45" text-anchor="middle" font-size="11" fill="#888">256</text>

  <!-- Connection lines -->
  <g stroke="#ccc" stroke-width="0.5" opacity="0.5">
    <line x1="270" y1="85" x2="370" y2="85"/>
    <line x1="270" y1="110" x2="370" y2="105"/>
    <line x1="270" y1="135" x2="370" y2="130"/>
    <line x1="270" y1="160" x2="370" y2="155"/>
    <line x1="270" y1="185" x2="370" y2="180"/>
    <line x1="270" y1="85" x2="370" y2="155"/>
    <line x1="270" y1="185" x2="370" y2="105"/>
  </g>

  <!-- Hidden Layer 2 -->
  <rect x="370" y="70" width="30" height="130" rx="4" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="385" y="140" text-anchor="middle" font-size="10" fill="#1e40af" transform="rotate(-90,385,140)">Hidden 2 + ReLU</text>
  <text x="385" y="55" text-anchor="middle" font-size="11" fill="#888">128</text>

  <!-- Connection lines -->
  <g stroke="#ccc" stroke-width="0.5" opacity="0.5">
    <line x1="400" y1="95" x2="490" y2="100"/>
    <line x1="400" y1="120" x2="490" y2="120"/>
    <line x1="400" y1="145" x2="490" y2="140"/>
    <line x1="400" y1="170" x2="490" y2="160"/>
    <line x1="400" y1="95" x2="490" y2="160"/>
    <line x1="400" y1="170" x2="490" y2="100"/>
  </g>

  <!-- Output Layer -->
  <g transform="translate(490,60)">
    <rect x="0" y="0" width="30" height="150" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
    <!-- Digit labels -->
    <text x="15" y="18" text-anchor="middle" font-size="10" fill="#065f46">0</text>
    <text x="15" y="33" text-anchor="middle" font-size="10" fill="#065f46">1</text>
    <text x="15" y="48" text-anchor="middle" font-size="10" fill="#065f46">2</text>
    <text x="15" y="63" text-anchor="middle" font-size="10" fill="#065f46">3</text>
    <text x="15" y="78" text-anchor="middle" font-size="10" fill="#065f46">4</text>
    <text x="15" y="93" text-anchor="middle" font-size="10" fill="#065f46">5</text>
    <text x="15" y="108" text-anchor="middle" font-size="10" fill="#065f46">6</text>
    <text x="15" y="123" text-anchor="middle" font-size="10" fill="#065f46">7</text>
    <text x="15" y="138" text-anchor="middle" font-size="10" fill="#065f46">8</text>
    <text x="15" y="148" text-anchor="middle" font-size="10" fill="#065f46">9</text>
  </g>
  <text x="505" y="45" text-anchor="middle" font-size="11" fill="#888">10</text>
  <text x="505" y="228" text-anchor="middle" font-size="11" fill="#059669">Softmax</text>

  <!-- Parameter counts -->
  <text x="200" y="260" text-anchor="middle" font-size="11" fill="#666">784x256+256</text>
  <text x="200" y="275" text-anchor="middle" font-size="11" fill="#666">= 200,960</text>

  <text x="330" y="260" text-anchor="middle" font-size="11" fill="#666">256x128+128</text>
  <text x="330" y="275" text-anchor="middle" font-size="11" fill="#666">= 32,896</text>

  <text x="450" y="260" text-anchor="middle" font-size="11" fill="#666">128x10+10</text>
  <text x="450" y="275" text-anchor="middle" font-size="11" fill="#666">= 1,290</text>

  <text x="330" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Total parameters: 235,146</text>
</svg>