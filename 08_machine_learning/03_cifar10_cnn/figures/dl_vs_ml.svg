<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Traditional ML vs Deep Learning</text>

  <!-- Traditional ML side -->
  <text x="150" y="65" text-anchor="middle" font-size="15" font-weight="bold" fill="#2563eb">Traditional ML</text>

  <rect x="85" y="80" width="130" height="40" rx="6" fill="#e0e7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="105" text-anchor="middle" fill="#1e40af">Raw Data</text>

  <line x1="150" y1="120" x2="150" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="65" y="155" width="170" height="40" rx="6" fill="#e0e7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="180" text-anchor="middle" fill="#1e40af">Hand-crafted Features</text>

  <line x1="150" y1="195" x2="150" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="85" y="230" width="130" height="40" rx="6" fill="#e0e7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="255" text-anchor="middle" fill="#1e40af">Classifier</text>

  <line x1="150" y1="270" x2="150" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="85" y="305" width="130" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="330" text-anchor="middle" fill="#1e40af">Prediction</text>

  <!-- Divider -->
  <line x1="350" y1="55" x2="350" y2="360" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Deep Learning side -->
  <text x="530" y="65" text-anchor="middle" font-size="15" font-weight="bold" fill="#059669">Deep Learning</text>

  <rect x="465" y="80" width="130" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="530" y="105" text-anchor="middle" fill="#065f46">Raw Data</text>

  <line x1="530" y1="120" x2="530" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="445" y="150" width="170" height="36" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="530" y="173" text-anchor="middle" fill="#065f46">Layer 1</text>
  <text x="640" y="173" font-size="11" fill="#888">low-level</text>

  <line x1="530" y1="186" x2="530" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="445" y="205" width="170" height="36" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="530" y="228" text-anchor="middle" fill="#065f46">Layer 2</text>
  <text x="640" y="228" font-size="11" fill="#888">mid-level</text>

  <line x1="530" y1="241" x2="530" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="445" y="260" width="170" height="36" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="530" y="283" text-anchor="middle" fill="#065f46">Layer 3</text>
  <text x="640" y="283" font-size="11" fill="#888">high-level</text>

  <line x1="530" y1="296" x2="530" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="465" y="315" width="130" height="40" rx="6" fill="#a7f3d0" stroke="#059669" stroke-width="1.5"/>
  <text x="530" y="340" text-anchor="middle" fill="#065f46">Prediction</text>
</svg>