<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <text x="360" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Problems with FC Networks for Images</text>

  <!-- Problem 1: Spatial structure -->
  <g transform="translate(20,45)">
    <rect x="0" y="0" width="200" height="110" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
    <text x="100" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">1. Destroys Spatial Structure</text>

    <rect x="20" y="35" width="50" height="50" rx="3" fill="#e5e7eb" stroke="#999"/>
    <text x="45" y="55" text-anchor="middle" font-size="10" fill="#555">pixels</text>
    <text x="45" y="68" text-anchor="middle" font-size="10" fill="#555">2D</text>

    <text x="90" y="65" font-size="16" fill="#555">&#x2192;</text>

    <rect x="115" y="30" width="20" height="60" rx="3" fill="#e5e7eb" stroke="#999"/>
    <text x="125" y="55" text-anchor="middle" font-size="8" fill="#555">1D</text>

    <text x="155" y="65" font-size="9" fill="#888">no concept of</text>
    <text x="155" y="77" font-size="9" fill="#888">"neighbors"</text>
  </g>

  <!-- Problem 2: Translation invariance -->
  <g transform="translate(250,45)">
    <rect x="0" y="0" width="210" height="110" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
    <text x="105" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">2. No Translation Invariance</text>

    <rect x="20" y="35" width="50" height="50" rx="3" fill="#e5e7eb" stroke="#999"/>
    <text x="32" y="58" font-size="16" fill="#333">7</text>

    <text x="85" y="65" text-anchor="middle" font-size="16" fill="#dc2626" font-weight="bold">&#x2260;</text>

    <rect x="105" y="35" width="50" height="50" rx="3" fill="#e5e7eb" stroke="#999"/>
    <text x="135" y="58" font-size="16" fill="#333">7</text>

    <text x="105" y="100" text-anchor="middle" font-size="10" fill="#888">FC sees these as</text>
    <text x="105" y="112" text-anchor="middle" font-size="10" fill="#888">completely different</text>
  </g>

  <!-- Problem 3: Parameters -->
  <g transform="translate(490,45)">
    <rect x="0" y="0" width="210" height="110" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
    <text x="105" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">3. Too Many Parameters</text>

    <text x="105" y="50" text-anchor="middle" font-size="11" fill="#555">32x32x3 = 3,072 inputs</text>
    <text x="105" y="68" text-anchor="middle" font-size="11" fill="#555">x 512 neurons</text>
    <text x="105" y="93" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">= 1,572,864 weights</text>
    <text x="105" y="110" text-anchor="middle" font-size="10" fill="#888">(first layer alone!)</text>
  </g>

  <!-- Solution: CNN -->
  <rect x="160" y="180" width="400" height="100" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="360" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">Solution: Convolutional Neural Networks</text>
  <text x="360" y="228" text-anchor="middle" font-size="12" fill="#059669">Preserve spatial structure | Share parameters</text>
  <text x="360" y="248" text-anchor="middle" font-size="12" fill="#059669">Detect patterns regardless of position</text>
  <text x="360" y="268" text-anchor="middle" font-size="12" fill="#059669">3x3 filter = only 9 weights (vs millions)</text>
</svg>