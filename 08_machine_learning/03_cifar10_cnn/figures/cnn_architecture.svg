<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <defs>
    <marker id="ac" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <text x="360" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">CNN Architecture for CIFAR-10 (Tutorial 3)</text>

  <!-- Input -->
  <rect x="280" y="40" width="160" height="32" rx="6" fill="#e0e7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="360" y="61" text-anchor="middle" font-weight="bold" fill="#1e40af">Input: 3 x 32 x 32</text>
  <text x="360" y="52" text-anchor="middle" font-size="10" fill="#3b82f6">(RGB image)</text>
  <line x1="360" y1="72" x2="360" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#ac)"/>

  <!-- Block 1 -->
  <rect x="130" y="95" width="460" height="80" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="115" font-size="13" font-weight="bold" fill="#1e40af">Block 1</text>
  <text x="360" y="118" text-anchor="middle" font-size="12" fill="#555">Conv2d(3&#x2192;32, 3x3, pad=1) &#x2192; BatchNorm &#x2192; ReLU</text>
  <text x="360" y="138" text-anchor="middle" font-size="12" fill="#555">Conv2d(32&#x2192;32, 3x3, pad=1) &#x2192; BatchNorm &#x2192; ReLU</text>
  <text x="360" y="158" text-anchor="middle" font-size="12" fill="#555">MaxPool2d(2x2)</text>
  <text x="600" y="160" font-size="11" fill="#888">&#x2192; 32 x 16 x 16</text>
  <line x1="360" y1="175" x2="360" y2="195" stroke="#555" stroke-width="1.5" marker-end="url(#ac)"/>

  <!-- Block 2 -->
  <rect x="130" y="200" width="460" height="80" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="220" font-size="13" font-weight="bold" fill="#1e40af">Block 2</text>
  <text x="360" y="223" text-anchor="middle" font-size="12" fill="#555">Conv2d(32&#x2192;64, 3x3, pad=1) &#x2192; BatchNorm &#x2192; ReLU</text>
  <text x="360" y="243" text-anchor="middle" font-size="12" fill="#555">Conv2d(64&#x2192;64, 3x3, pad=1) &#x2192; BatchNorm &#x2192; ReLU</text>
  <text x="360" y="263" text-anchor="middle" font-size="12" fill="#555">MaxPool2d(2x2)</text>
  <text x="600" y="265" font-size="11" fill="#888">&#x2192; 64 x 8 x 8</text>
  <line x1="360" y1="280" x2="360" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#ac)"/>

  <!-- Block 3 -->
  <rect x="130" y="305" width="460" height="80" rx="8" fill="#93c5fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="325" font-size="13" font-weight="bold" fill="#1e40af">Block 3</text>
  <text x="360" y="328" text-anchor="middle" font-size="12" fill="#555">Conv2d(64&#x2192;128, 3x3, pad=1) &#x2192; BatchNorm &#x2192; ReLU</text>
  <text x="360" y="348" text-anchor="middle" font-size="12" fill="#555">Conv2d(128&#x2192;128, 3x3, pad=1) &#x2192; BatchNorm &#x2192; ReLU</text>
  <text x="360" y="368" text-anchor="middle" font-size="12" fill="#555">MaxPool2d(2x2)</text>
  <text x="600" y="370" font-size="11" fill="#888">&#x2192; 128 x 4 x 4</text>
  <line x1="360" y1="385" x2="360" y2="405" stroke="#555" stroke-width="1.5" marker-end="url(#ac)"/>

  <!-- Classifier -->
  <rect x="180" y="410" width="360" height="80" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="200" y="430" font-size="13" font-weight="bold" fill="#065f46">Classifier</text>
  <text x="360" y="433" text-anchor="middle" font-size="12" fill="#555">Flatten (128x4x4 = 2048) &#x2192; Dropout(0.5)</text>
  <text x="360" y="453" text-anchor="middle" font-size="12" fill="#555">Linear(2048, 256) &#x2192; ReLU &#x2192; Dropout(0.3)</text>
  <text x="360" y="473" text-anchor="middle" font-size="12" fill="#555">Linear(256, 10)</text>
  <line x1="360" y1="490" x2="360" y2="505" stroke="#555" stroke-width="1.5" marker-end="url(#ac)"/>

  <!-- Output -->
  <text x="360" y="520" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">Output: 10 class probabilities</text>
</svg>