<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 260" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <defs>
    <marker id="al" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <text x="220" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Learning Rate Scheduling</text>

  <!-- Axes -->
  <line x1="60" y1="200" x2="400" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#al)"/>
  <line x1="60" y1="200" x2="60" y2="40" stroke="#555" stroke-width="1.5" marker-end="url(#al)"/>
  <text x="230" y="230" text-anchor="middle" fill="#555">Epoch</text>
  <text x="25" y="120" text-anchor="middle" fill="#555" transform="rotate(-90,25,120)">Learning Rate</text>

  <!-- Step decay curve -->
  <path d="M 65,60 L 140,60 L 140,100 L 220,100 L 220,140 L 300,140 L 300,165 L 380,165" fill="none" stroke="#2563eb" stroke-width="2.5"/>

  <!-- Smooth decay (alternative) -->
  <path d="M 65,60 C 120,70 180,110 250,145 C 300,165 350,175 380,178" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Labels -->
  <rect x="80" y="55" width="40" height="18" rx="3" fill="#e0e7ff"/>
  <text x="100" y="68" text-anchor="middle" font-size="10" fill="#2563eb">high</text>

  <rect x="335" y="158" width="35" height="18" rx="3" fill="#e0e7ff"/>
  <text x="352" y="171" text-anchor="middle" font-size="10" fill="#2563eb">low</text>

  <!-- Phase labels -->
  <text x="120" y="245" text-anchor="middle" font-size="11" fill="#d97706">Fast exploration</text>
  <text x="330" y="245" text-anchor="middle" font-size="11" fill="#059669">Fine-tuning</text>

  <!-- Divider arrow -->
  <line x1="220" y1="205" x2="220" y2="250" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <line x1="260" y1="45" x2="290" y2="45" stroke="#2563eb" stroke-width="2"/>
  <text x="295" y="49" font-size="11" fill="#555">Step decay</text>
  <line x1="260" y1="60" x2="290" y2="60" stroke="#059669" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="295" y="64" font-size="11" fill="#555">Smooth decay</text>
</svg>