<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 280" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <text x="290" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Max Pooling (2x2)</text>

  <!-- Input label -->
  <text x="120" y="55" text-anchor="middle" font-size="14" fill="#555">Input (4x4)</text>

  <!-- Input grid 4x4 -->
  <g transform="translate(30,65)">
    <!-- Top-left 2x2 block -->
    <rect x="0" y="0" width="90" height="90" rx="2" fill="#e0e7ff" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>
    <!-- Top-right 2x2 block -->
    <rect x="90" y="0" width="90" height="90" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" opacity="0.3"/>
    <!-- Bottom-left 2x2 block -->
    <rect x="0" y="90" width="90" height="90" rx="2" fill="#d1fae5" stroke="#059669" stroke-width="1.5" opacity="0.3"/>
    <!-- Bottom-right 2x2 block -->
    <rect x="90" y="90" width="90" height="90" rx="2" fill="#fce7f3" stroke="#db2777" stroke-width="1.5" opacity="0.3"/>

    <!-- Grid lines and values -->
    <rect x="0" y="0" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="22" y="28" text-anchor="middle" fill="#333">1</text>
    <rect x="45" y="0" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="67" y="28" text-anchor="middle" fill="#333">3</text>
    <rect x="90" y="0" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="112" y="28" text-anchor="middle" fill="#333">2</text>
    <rect x="135" y="0" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="157" y="28" text-anchor="middle" fill="#333">1</text>

    <rect x="0" y="45" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="22" y="73" text-anchor="middle" fill="#1e40af" font-weight="bold">4</text>
    <rect x="45" y="45" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="67" y="73" text-anchor="middle" fill="#333">2</text>
    <rect x="90" y="45" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="112" y="73" text-anchor="middle" fill="#333">1</text>
    <rect x="135" y="45" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="157" y="73" text-anchor="middle" fill="#92400e" font-weight="bold">3</text>

    <rect x="0" y="90" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="22" y="118" text-anchor="middle" fill="#333">1</text>
    <rect x="45" y="90" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="67" y="118" text-anchor="middle" fill="#333">0</text>
    <rect x="90" y="90" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="112" y="118" text-anchor="middle" fill="#333">3</text>
    <rect x="135" y="90" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="157" y="118" text-anchor="middle" fill="#333">2</text>

    <rect x="0" y="135" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="22" y="163" text-anchor="middle" fill="#065f46" font-weight="bold">2</text>
    <rect x="45" y="135" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="67" y="163" text-anchor="middle" fill="#333">1</text>
    <rect x="90" y="135" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="112" y="163" text-anchor="middle" fill="#333">1</text>
    <rect x="135" y="135" width="45" height="45" fill="none" stroke="#999" stroke-width="0.5"/>
    <text x="157" y="163" text-anchor="middle" fill="#9d174d" font-weight="bold">4</text>
  </g>

  <!-- Arrow -->
  <text x="270" y="150" font-size="28" fill="#555">&#x2192;</text>
  <text x="270" y="175" text-anchor="middle" font-size="11" fill="#888">2x2</text>
  <text x="270" y="190" text-anchor="middle" font-size="11" fill="#888">max pool</text>

  <!-- Output label -->
  <text x="420" y="55" text-anchor="middle" font-size="14" fill="#555">Output (2x2)</text>

  <!-- Output grid 2x2 -->
  <g transform="translate(340,65)">
    <rect x="0" y="0" width="80" height="80" fill="#e0e7ff" stroke="#2563eb" stroke-width="2"/>
    <text x="40" y="47" text-anchor="middle" fill="#1e40af" font-size="20" font-weight="bold">4</text>

    <rect x="80" y="0" width="80" height="80" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="120" y="47" text-anchor="middle" fill="#92400e" font-size="20" font-weight="bold">3</text>

    <rect x="0" y="80" width="80" height="80" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="40" y="127" text-anchor="middle" fill="#065f46" font-size="20" font-weight="bold">2</text>

    <rect x="80" y="80" width="80" height="80" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <text x="120" y="127" text-anchor="middle" fill="#9d174d" font-size="20" font-weight="bold">4</text>
  </g>

  <!-- Purpose -->
  <text x="290" y="260" text-anchor="middle" font-size="12" fill="#555">Reduces spatial dimensions | Adds invariance to small shifts</text>
</svg>