<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 260" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Inputs -->
  <text x="30" y="25" font-size="13" fill="#888">Inputs</text>
  <text x="130" y="25" font-size="13" fill="#888">Weights</text>

  <circle cx="50" cy="60" r="20" fill="#e0e7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="50" y="65" text-anchor="middle" fill="#1e40af" font-size="13">x&#x2081;</text>

  <circle cx="50" cy="130" r="20" fill="#e0e7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="50" y="135" text-anchor="middle" fill="#1e40af" font-size="13">x&#x2082;</text>

  <circle cx="50" cy="200" r="20" fill="#e0e7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="50" y="205" text-anchor="middle" fill="#1e40af" font-size="13">x&#x2083;</text>

  <!-- Weights on connections -->
  <line x1="70" y1="60" x2="220" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="130" y="78" fill="#dc2626" font-size="12">w&#x2081;</text>

  <line x1="70" y1="130" x2="220" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="140" y="123" fill="#dc2626" font-size="12">w&#x2082;</text>

  <line x1="70" y1="200" x2="220" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="130" y="185" fill="#dc2626" font-size="12">w&#x2083;</text>

  <!-- Sum node -->
  <circle cx="240" cy="130" r="28" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="240" y="127" text-anchor="middle" font-size="16" fill="#92400e">&#x2211;</text>
  <text x="240" y="145" text-anchor="middle" font-size="11" fill="#92400e">+ b</text>

  <!-- Arrow to activation -->
  <line x1="268" y1="130" x2="350" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="300" y="120" text-anchor="middle" font-size="12" fill="#555">z</text>

  <!-- Activation function box -->
  <rect x="355" y="105" width="120" height="50" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="415" y="125" text-anchor="middle" fill="#065f46" font-size="13">Activation</text>
  <text x="415" y="143" text-anchor="middle" fill="#065f46" font-size="13">f(z)</text>

  <!-- Output -->
  <line x1="475" y1="130" x2="560" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <circle cx="585" cy="130" r="22" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="585" y="135" text-anchor="middle" fill="#9d174d" font-size="12">output</text>

  <!-- Formula -->
  <text x="325" y="235" text-anchor="middle" font-size="13" fill="#333">z = w&#x2081;x&#x2081; + w&#x2082;x&#x2082; + w&#x2083;x&#x2083; + b</text>
  <text x="325" y="255" text-anchor="middle" font-size="13" fill="#333">output = f(z)</text>
</svg>