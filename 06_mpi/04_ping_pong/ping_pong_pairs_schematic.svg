<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .title { font: 48px sans-serif; font-weight: 700; fill: #111827; }
      .subtitle { font: 24px sans-serif; fill: #374151; }
      .nodeLabel { font: 22px monospace; font-weight: 700; fill: #1f2937; }
      .sideLabel { font: 26px sans-serif; font-weight: 700; fill: #0f172a; }
      .legend { font: 20px sans-serif; fill: #334155; }
    </style>
    <marker id="arrow_fwd" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow_ret" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="#f8fafc"/>

  <text x="700" y="70" text-anchor="middle" class="title">Half-to-Half MPI Ping-Pong (Injection Bandwidth)</text>
  <text x="700" y="108" text-anchor="middle" class="subtitle">First half sends to second half, then receives reply</text>

  <rect x="120" y="170" width="460" height="520" rx="16" fill="#e2e8f0" stroke="#94a3b8"/>
  <rect x="820" y="170" width="460" height="520" rx="16" fill="#e2e8f0" stroke="#94a3b8"/>

  <text x="350" y="215" text-anchor="middle" class="sideLabel">First Half (rank &lt; half)</text>
  <text x="1050" y="215" text-anchor="middle" class="sideLabel">Second Half (rank &gt;= half)</text>

  <text x="220" y="300" class="nodeLabel">r0</text>
  <text x="220" y="390" class="nodeLabel">r1</text>
  <text x="220" y="480" class="nodeLabel">r2</text>
  <text x="220" y="570" class="nodeLabel">r3</text>

  <text x="920" y="300" class="nodeLabel">r4</text>
  <text x="920" y="390" class="nodeLabel">r5</text>
  <text x="920" y="480" class="nodeLabel">r6</text>
  <text x="920" y="570" class="nodeLabel">r7</text>

  <line x1="290" y1="290" x2="900" y2="290" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow_fwd)"/>
  <line x1="290" y1="380" x2="900" y2="380" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow_fwd)"/>
  <line x1="290" y1="470" x2="900" y2="470" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow_fwd)"/>
  <line x1="290" y1="560" x2="900" y2="560" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow_fwd)"/>

  <line x1="900" y1="315" x2="290" y2="315" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow_ret)"/>
  <line x1="900" y1="405" x2="290" y2="405" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow_ret)"/>
  <line x1="900" y1="495" x2="290" y2="495" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow_ret)"/>
  <line x1="900" y1="585" x2="290" y2="585" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow_ret)"/>

  <text x="700" y="690" text-anchor="middle" class="legend">Blue: request send (rank -&gt; rank+half) | Red: reply send (rank+half -&gt; rank)</text>
  <text x="700" y="730" text-anchor="middle" class="legend">All pairs run concurrently, approximating aggregate injection bandwidth across multiple NIC paths.</text>
</svg>
